<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>档案关键词提取助手</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: "Microsoft YaHei", Arial, sans-serif; background: #f0f4f8; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .container { background: white; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); padding: 40px; max-width: 700px; width: 100%; }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 8px; font-size: 24px; }
        .subtitle { text-align: center; color: #7f8c8d; font-size: 14px; margin-bottom: 30px; }
        textarea { width: 100%; height: 180px; border: 2px solid #e0e6ed; border-radius: 10px; padding: 14px; font-size: 15px; resize: none; outline: none; transition: border-color 0.3s; }
        textarea:focus { border-color: #3498db; }
        .btn { display: block; width: 100%; padding: 14px; margin-top: 20px; background: #3498db; color: white; border: none; border-radius: 10px; font-size: 16px; cursor: pointer; transition: background 0.3s; }
        .btn:hover { background: #2980b9; }
        .btn:disabled { background: #bdc3c7; cursor: not-allowed; }
        .result { margin-top: 24px; padding: 20px; background: #f8f9fa; border-radius: 10px; min-height: 60px; }
        .result-label { font-size: 13px; color: #95a5a6; margin-bottom: 10px; }
        .keyword-tag { display: inline-block; background: #3498db; color: white; padding: 6px 14px; border-radius: 20px; margin: 4px; font-size: 14px; }
        .error { color: #e74c3c; font-size: 14px; }
        .copy-btn { margin-top: 12px; padding: 8px 16px; background: #2ecc71; color: white; border: none; border-radius: 6px; font-size: 13px; cursor: pointer; }
        .copy-btn:hover { background: #27ae60; }
    </style>
</head>
<body>
    <div class="container">
        <h1>档案关键词提取助手</h1>
        <p class="subtitle">基于大模型智能提取档案文本关键词</p>
        <textarea id="inputText" placeholder="请粘贴档案原文（至少20个字符）..."></textarea>
        <button class="btn" id="extractBtn" onclick="extractKeywords()">提取关键词</button>
        <div class="result">
            <div class="result-label">提取结果</div>
            <div id="resultArea">等待输入...</div>
        </div>
    </div>

    <script>
        async function extractKeywords() {
            const btn = document.getElementById("extractBtn");
            const text = document.getElementById("inputText").value;
            const resultArea = document.getElementById("resultArea");

            if (text.trim().length < 20) {
                resultArea.innerHTML = '<span class="error">文本太短，至少需要20个字符</span>';
                return;
            }

            btn.disabled = true;
            btn.textContent = "提取中...";
            resultArea.innerHTML = "正在分析...";

            try {
                const res = await fetch("/extract", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ text })
                });
                const data = await res.json();

                if (data.error) {
                    resultArea.innerHTML = `<span class="error">${data.error}</span>`;
                } else {
                    const tags = data.keywords.map(k => `<span class="keyword-tag">${k}</span>`).join("");
                    resultArea.innerHTML = tags + `<button class="copy-btn" onclick="copyKeywords()">复制关键词</button>`;
                    resultArea.dataset.keywords = data.keywords.join(",");
                }
            } catch (e) {
                resultArea.innerHTML = `<span class="error">网络错误，请重试</span>`;
            } finally {
                btn.disabled = false;
                btn.textContent = "提取关键词";
            }
        }

        function copyKeywords() {
            const text = document.getElementById("resultArea").dataset.keywords;
            if (text) navigator.clipboard.writeText(text).then(() => alert("已复制！"));
        }
    </script>
</body>
</html>
