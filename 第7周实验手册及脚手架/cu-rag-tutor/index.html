<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智识游侠 · AI学习助手</title>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Noto Sans SC', 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            background-size: 400% 400%;
            animation: gradientBG 20s ease infinite;
            color: #fff;
            min-height: 100vh;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        .blob {
            position: absolute;
            filter: blur(100px);
            z-index: 0;
            opacity: 0.5;
            animation: float 15s infinite ease-in-out;
        }
        .blob-1 { top: 0; left: 0; width: 500px; height: 500px; background: #7c3aed; }
        .blob-2 { bottom: 0; right: 0; width: 600px; height: 600px; background: #db2777; animation-delay: -7s; }
        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -30px) scale(1.05); }
            66% { transform: translate(-20px, 20px) scale(0.95); }
        }
    </style>
</head>
<body class="relative min-h-screen text-slate-100">
    <div class="blob blob-1 rounded-full"></div>
    <div class="blob blob-2 rounded-full"></div>

    <div class="relative z-10 max-w-4xl mx-auto px-4 py-12 text-center">
        <div class="w-24 h-24 rounded-3xl flex items-center justify-center mx-auto mb-6 bg-gradient-to-br from-violet-600 to-fuchsia-600 shadow-lg shadow-violet-500/30">
            <i class="fa-solid fa-dragon text-5xl text-white"></i>
        </div>
        
        <h1 class="text-5xl font-bold mb-4 bg-clip-text text-transparent bg-gradient-to-r from-white via-violet-200 to-purple-300">
            智识游侠
        </h1>
        
        <p class="text-xl text-slate-300 mb-8">AI驱动的游戏化学习助手 · 档案学专业RAG问答系统</p>
        
        <div class="glass-panel rounded-2xl p-8 max-w-md mx-auto">
            <h2 class="text-2xl font-semibold mb-4">系统维护中</h2>
            <p class="text-slate-400 mb-6">当前系统正在进行维护升级，请稍后再试。</p>
            <div class="text-sm text-slate-500">
                <p>如需帮助，请联系管理员</p>
            </div>
        </div>
        
        <footer class="mt-12 text-slate-500 text-sm">
            <p>Powered by Qwen3 & ChromaDB</p>
        </footer>
    </div>
</body>
</html>
